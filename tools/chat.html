<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考试助手 - RAG</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
header { background: #16213e; padding: 12px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #0f3460; }
header h1 { font-size: 18px; white-space: nowrap; }
header select { padding: 6px 10px; background: #0f3460; color: #eee; border: 1px solid #1a508b; border-radius: 4px; font-size: 14px; }
#chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.7; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
.msg.user { align-self: flex-end; background: #0f3460; }
.msg.assistant { align-self: flex-start; background: #16213e; border: 1px solid #1a508b; }
.msg .sources { margin-top: 8px; font-size: 12px; color: #7ec8e3; }
footer { padding: 12px 20px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 10px; }
footer input { flex: 1; padding: 10px 14px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 8px; color: #eee; font-size: 14px; }
footer input:focus { outline: none; border-color: #1a508b; }
footer button { padding: 10px 20px; background: #1a508b; color: #eee; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
footer button:hover { background: #236bb3; }
.loading { align-self: flex-start; color: #888; font-size: 13px; padding: 8px 16px; }
.info { color: #888; font-size: 13px; text-align: center; padding: 20px; }
</style>
</head>
<body>

<header>
  <h1>考试助手</h1>
  <select id="subject" onchange="onSubjectChange()">
    <option value="">-- 选择科目 --</option>
  </select>
  <span style="font-size:12px;color:#888">回答基于教材，可追问</span>
</header>

<div id="chat">
  <div class="info">选择科目后开始提问，模型会严格根据教材内容回答</div>
</div>

<footer>
  <input id="input" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')send()" disabled>
  <button id="sendBtn" onclick="send()" disabled>发送</button>
</footer>

<script>
let history = [];
let currentSubject = '';

async function loadSubjects() {
  try {
    let r = await fetch('/api/subjects');
    let data = await r.json();
    let sel = document.getElementById('subject');
    data.subjects.forEach(s => {
      let opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      sel.appendChild(opt);
    });
  } catch(e) {
    console.error(e);
  }
}

function onSubjectChange() {
  currentSubject = document.getElementById('subject').value;
  history = [];
  document.getElementById('chat').innerHTML = currentSubject
    ? '<div class="info">已选择「'+currentSubject+'」，开始提问吧</div>'
    : '<div class="info">选择科目后开始提问</div>';
  updateInput();
}

function updateInput() {
  let ok = !!currentSubject;
  document.getElementById('input').disabled = !ok;
  document.getElementById('sendBtn').disabled = !ok;
  if (ok) document.getElementById('input').focus();
}

async function send() {
  let input = document.getElementById('input');
  let q = input.value.trim();
  if (!q || !currentSubject) return;
  input.value = '';
  input.disabled = true;

  let chat = document.getElementById('chat');
  chat.insertAdjacentHTML('beforeend', '<div class="msg user">'+esc(q)+'</div>');
  chat.insertAdjacentHTML('beforeend', '<div class="loading">检索教材中...</div>');
  chat.scrollTop = chat.scrollHeight;

  try {
    let r = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({subject: currentSubject, question: q, history: history})
    });
    let data = await r.json();

    // 移除 loading
    document.querySelector('.loading')?.remove();

    if (data.error) {
      chat.insertAdjacentHTML('beforeend', '<div class="msg assistant">'+esc(data.error)+'</div>');
    } else {
      let srcs = data.sources?.length ? '<div class="sources">参考: '+data.sources.join(', ')+'</div>' : '';
      let div = document.createElement('div');
      div.className = 'msg assistant';
      div.innerHTML = esc(data.answer) + srcs;
      chat.appendChild(div);
      renderMathInElement(div, {delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false}
      ]});
      history.push({role: 'user', content: q});
      history.push({role: 'assistant', content: data.answer});
    }
  } catch(e) {
    document.querySelector('.loading')?.remove();
    chat.insertAdjacentHTML('beforeend', '<div class="msg assistant">连接失败，请确认已启动 chat_server</div>');
  }

  input.disabled = false;
  input.focus();
  chat.scrollTop = chat.scrollHeight;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadSubjects();
</script>
</body>
</html>
